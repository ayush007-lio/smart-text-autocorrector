<!DOCTYPE html>
<html>
<head>
    <title>Smart Autocorrector</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>✨ Smart Text Autocorrector</h1>

    <form method="POST">
        <textarea name="text" placeholder="Enter your text...">{{ text }}</textarea>
        <br>
        <button type="submit">Correct</button>
    </form>

    {% if corrected %}
    <div class="output">
        <h3>Corrected Text:</h3>
        <p>{{ corrected }}</p>
    </div>
    {% endif %}
</div>

</body>
</html>
